name: Android Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 1. Gradle 8.6 환경을 서버에 직접 구축합니다.
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.6

      # 2. 저장소의 gradlew 대신 서버의 gradle 명령어를 직접 실행합니다.
      # 이렇게 하면 'GradleWrapperMain' 클래스 누락 문제를 완벽히 우회합니다.
      - name: Build with System Gradle
        run: gradle assembleDebug

      # 3. 빌드된 APK 파일 업로드
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: karatomo-app-debug
          path: app/build/outputs/apk/debug/*.apk
